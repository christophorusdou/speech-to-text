services:
  speaches:
    image: ghcr.io/speaches-ai/speaches:latest-cuda
    ports:
      - "8000:8000"
    volumes:
      - hf-cache:/home/ubuntu/.cache/huggingface/hub
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  # Ollama runs natively on the host (port 11434) — already installed with GPU access.
  # Pull models with: ollama pull qwen3:8b

volumes:
  hf-cache:
